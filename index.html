<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BMW Календарь</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #000;
  color: #fff;
}

.wallpaper {
  position: relative;
  width: 100%;
  height: 100vh;
  background: url("https://images.unsplash.com/photo-1617814076367-b759c7d7e738") center/cover;
}

.overlay {
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.6);
}

.quote {
  position: absolute;
  top: 120px;
  left: 20px;
  right: 20px;
  font-size: 18px;
}

.calendar {
  position: absolute;
  bottom: 100px;
  width: 100%;
  text-align: center;
}

.month {
  font-size: 28px;
  margin-bottom: 10px;
}

.days {
  display: grid;
  grid-template-columns: repeat(7,1fr);
  gap: 5px;
  padding: 10px;
}

.day {
  padding: 10px;
  background: rgba(255,255,255,0.05);
  border-radius: 8px;
}

.today {
  background: #1e90ff;
}
</style>
</head>

<body>

<div class="wallpaper">
<div class="overlay"></div>

<div class="quote" id="quote"></div>

<div class="calendar">
<div class="month" id="month"></div>
<div class="days" id="days"></div>
</div>

</div>

<script>
const quotes = [
"Господь — твердыня моя",
"Не бойся, ибо Я с тобой",
"Просите, и дано будет",
"Любовь никогда не перестаёт"
];

const today = new Date();

document.getElementById("quote").innerText =
quotes[today.getDate() % quotes.length];

const monthNames = ["Январь","Февраль","Март","Апрель","Май","Июнь","Июль","Август","Сентябрь","Октябрь","Ноябрь","Декабрь"];

document.getElementById("month").innerText =
monthNames[today.getMonth()] + " " + today.getFullYear();

const daysContainer = document.getElementById("days");

const daysInMonth = new Date(today.getFullYear(), today.getMonth()+1, 0).getDate();

for(let i=1;i<=daysInMonth;i++){
  const div = document.createElement("div");
  div.className = "day";
  div.innerText = i;

  if(i === today.getDate()){
    div.classList.add("today");
  }

  daysContainer.appendChild(div);
}
</script>

</body>
</html>
